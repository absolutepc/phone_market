<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Phone Market</title>
  <link rel="stylesheet" href="css/style.css?v=2.16">
  <style>#page-transition{position:fixed;inset:0;z-index:10000;background:#0a0e17}body.page-transition-active>:not(#page-transition){visibility:hidden}</style>
</head>
<body class="page-transition-active">
  <div id="page-transition" class="page-transition" role="status" aria-live="polite" aria-label="Загрузка">
    <div class="page-transition__inner">
      <div class="page-transition__logo"><img src="img/logo.svg" alt=""></div>
      <p class="page-transition__label">Корзина</p>
      <div class="page-transition__progress" aria-hidden="true"><span class="page-transition__progress-bar"></span></div>
    </div>
  </div>
  <script src="js/catalog-reset-boot.js?v=1.0"></script>
  <script src="js/transition-boot.js?v=1.1"></script>
  <div id="site-header"></div>
  <main>
    <div class="page-header">
      <div class="container">
        <div class="breadcrumbs"><a href="index.html">Главная</a> / <span>Корзина</span></div>
        <h1>Корзина</h1>
      </div>
    </div>
    <div class="container cart-layout" id="cartContent"></div>
  </main>
  <div id="site-footer"></div>
  <script src="js/data.js?v=2.3"></script>
  <script src="js/app.js?v=1.4"></script>
  <script src="js/layout.js"></script>
  <script src="js/transition.js?v=1.1"></script>
  <script>
    initLayout('cart');
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cartContent');
      if (!cart.length) {
        container.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><h2>Корзина пуста</h2><p>Добавьте iPhone из каталога</p><a href="catalog.html" class="btn btn-primary">В каталог</a></div>`;
        return;
      }
      const subtotal = getCartTotal();
      const shipping = subtotal >= 100000 ? 0 : 990;
      const total = subtotal + shipping;
      container.innerHTML = `
        <div class="cart-items">${cart.map(item => {
          const colorAttr = encodeURIComponent(item.colorName || '');
          const colorHtml = item.colorName ? `<div class="cart-item-color"><span class="cart-color-swatch" style="--swatch:${item.colorHex || '#ccc'}"></span><span>Цвет: ${item.colorName}</span></div>` : '';
          return `<div class="cart-item">
            <div class="cart-item-image">${renderProductImg(item.img, item.name)}</div>
            <div class="cart-item-info"><h3>${item.name}</h3>${colorHtml}</div>
            <div class="cart-item-qty">
              <button class="qty-btn qty-minus" data-id="${item.id}" data-type="${item.type}" data-color="${colorAttr}">−</button>
              <span>${item.qty}</span>
              <button class="qty-btn qty-plus" data-id="${item.id}" data-type="${item.type}" data-color="${colorAttr}">+</button>
            </div>
            <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
            <button class="btn btn-danger btn-sm remove-item" data-id="${item.id}" data-type="${item.type}" data-color="${colorAttr}">✕</button>
          </div>`;
        }).join('')}</div>
        <div class="cart-summary">
          <h3>Итого</h3>
          <div class="summary-row"><span>Подытог</span><span>${formatPrice(subtotal)}</span></div>
          <div class="summary-row"><span>Доставка</span><span>${shipping ? formatPrice(shipping) : 'Бесплатно'}</span></div>
          <div class="summary-row total"><span>К оплате</span><span>${formatPrice(total)}</span></div>
          <button class="btn btn-primary" id="checkoutBtn" style="width:100%;margin-top:16px">Оформить заказ</button>
        </div>`;
      container.querySelectorAll('.qty-minus').forEach(btn => btn.addEventListener('click', () => {
        const c = decodeURIComponent(btn.dataset.color || '');
        const item = findCartItem(getCart(), btn.dataset.id, btn.dataset.type, c);
        if (item?.qty > 1) { updateCartQty(btn.dataset.id, btn.dataset.type, item.qty - 1, c); renderCart(); }
      }));
      container.querySelectorAll('.qty-plus').forEach(btn => btn.addEventListener('click', () => {
        const c = decodeURIComponent(btn.dataset.color || '');
        const item = findCartItem(getCart(), btn.dataset.id, btn.dataset.type, c);
        if (item) { updateCartQty(btn.dataset.id, btn.dataset.type, item.qty + 1, c); renderCart(); }
      }));
      container.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', () => {
        removeFromCart(btn.dataset.id, btn.dataset.type, decodeURIComponent(btn.dataset.color || ''));
        renderCart();
      }));
      document.getElementById('checkoutBtn').addEventListener('click', () => {
        const order = createOrder(getCart(), getCurrentUser());
        clearCart(); renderCart();
        showToast(`Заказ ${order.id} оформлен!`, 'success');
      });
    }
    renderCart();
  </script>
</body>
</html>
