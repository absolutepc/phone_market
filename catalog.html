<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Phone Market</title>
  <link rel="stylesheet" href="css/style.css?v=2.12">
  <style>#page-transition{position:fixed;inset:0;z-index:10000;background:#0a0e17}body.page-transition-active>:not(#page-transition){visibility:hidden}</style>
</head>
<body class="page-transition-active">
  <div id="page-transition" class="page-transition" role="status" aria-live="polite" aria-label="Загрузка">
    <div class="page-transition__inner">
      <div class="page-transition__logo"><img src="img/logo.svg" alt=""></div>
      <p class="page-transition__label">Каталог</p>
      <div class="page-transition__progress" aria-hidden="true"><span class="page-transition__progress-bar"></span></div>
    </div>
  </div>
  <script src="js/catalog-reset-boot.js?v=1.0"></script>
  <script src="js/transition-boot.js"></script>

  <div id="site-header"></div>

  <main>
    <div class="page-header">
      <div class="container">
        <div class="breadcrumbs" id="catalogBreadcrumbs">
          <a href="index.html">Главная</a> / <span id="catalogBreadcrumbCurrent">Каталог</span>
        </div>
        <h1 id="catalogTitle">Каталог</h1>
        <p id="catalogSubtitle">Выберите категорию</p>
      </div>
    </div>

    <div class="container catalog-category-picker-wrap" id="catalogCategoryPicker" hidden>
      <div class="catalog-picker-grid" id="catalogCategoryPickerGrid"></div>
    </div>

    <div id="catalogProductsView" hidden>
      <div class="container">
        <nav class="catalog-lines" id="catalogLines" aria-label="Категории каталога"></nav>
      </div>

      <div class="container page-layout" id="catalogPageLayout">
      <aside class="filters-sidebar" id="filtersSidebar">
        <div class="filters-sidebar-header">
          <h3>Фильтры</h3>
          <button
            type="button"
            class="btn btn-secondary btn-sm filters-close-btn"
            id="filtersClose"
            aria-label="Скрыть фильтры"
          >
            Скрыть
          </button>
        </div>

        <div class="filter-group">
          <label>Модель</label>
          <div class="filter-checkboxes" id="categoryFilters"></div>
        </div>

        <div class="filter-group">
          <label>Память</label>
          <div class="filter-checkboxes" id="storageFilters"></div>
        </div>

        <div class="filter-group">
          <label>SIM</label>
          <div class="filter-checkboxes" id="simFilters"></div>
        </div>

        <div class="filter-group" id="priceFilterGroup">
          <label>Цена, ₽</label>
          <div class="filter-range-inputs">
            <input type="number" id="priceMin" placeholder="от" min="0" step="1000">
            <input type="number" id="priceMax" placeholder="до" min="0" step="1000">
          </div>
        </div>

        <div class="filter-group">
          <label>Метка</label>
          <div class="filter-checkboxes" id="badgeFilters"></div>
        </div>

        <button class="btn btn-secondary btn-sm" id="resetFilters" style="width:100%;margin-top:8px">Сбросить фильтры</button>
      </aside>

      <div class="catalog-content">
        <div class="catalog-toolbar">
          <div class="catalog-toolbar-start">
            <button
              type="button"
              class="btn btn-secondary btn-sm filters-toggle-btn"
              id="filtersToggle"
              aria-expanded="true"
              aria-controls="filtersSidebar"
            >
              Скрыть фильтры
            </button>
            <span class="results-count" id="resultsCount">Найдено: 0</span>
          </div>
          <select id="sortSelect">
            <option value="default">Сортировка: по умолчанию</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="name">Название: А–Я</option>
          </select>
        </div>
        <div id="catalogGrid"></div>
      </div>
    </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js?v=1.4"></script>
  <script src="js/app.js?v=1.3"></script>
  <script src="js/layout.js"></script>
  <script src="js/transition.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/filters.js?v=1.5"></script>
  <script src="js/catalog.js?v=2.3"></script>
  <script>initLayout('catalog');</script>
</body>
</html>
